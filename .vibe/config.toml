[vibe]
version = 1
lang = "zh-TW"

[state]
compact_threshold = 150
stale_task_days = 30

[adapters]
enabled = [
    "claude",
    "agents_md",
]

[git]
enabled = true

[experiments]
commit_patterns = [
    "autoresearch:",
    "experiment:",
    "[autoresearch]",
    "[experiment]",
    "auto-research",
]
revert_prefixes = [
    "revert",
    "reset",
    "rollback",
    "undo",
]
